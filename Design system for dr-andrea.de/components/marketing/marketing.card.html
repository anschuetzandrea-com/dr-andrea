<!-- @dsCard group="Components" viewport="760x560" subtitle="Testimonial, steps, media slot" name="Marketing" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-page);color:var(--text-primary)}
  #root{padding:28px}
  .sec{font:600 11px var(--font-sans);letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);margin:0 0 16px}
  .block{border-top:1px solid var(--line);padding-top:22px;margin-top:26px}
</style></head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function findNS(){
      for (const k of Object.keys(window)) {
        try {
          const v = window[k];
          if (v && typeof v === "object" && v.TestimonialCard && v.StepItem) return v;
        } catch (e) {}
      }
      return window;
    }
    const NS = findNS();
    const { TestimonialCard, StepItem, MediaSlot, Eyebrow } = NS;
    function Demo(){
      return (
        <div>
          <p className="sec">Testimonial</p>
          <TestimonialCard
            name="Boris Bezend"
            intro="Boris hat vor ein paar Monaten angefangen, sich mit Dr. Andrea zu unterhalten."
            quote="„Ich konnte effektiv Muster in meiner Wahrnehmung und Verarbeitung von Emotionen verändern. Eine klare Empfehlung.“"
            media={<MediaSlot label="Testimonial-Video" ratio="16 / 11" />}
          />
          <div className="block">
            <p className="sec">Schritte</p>
            <div style={{display:"flex",flexDirection:"column",gap:18,maxWidth:560}}>
              <StepItem number="1" title="Kostenloses Erstgespräch">Wir ermitteln zusammen deine Ziele und Themen.</StepItem>
              <StepItem number="2" title="Gemeinsamer Weg">Wir einigen uns auf ein Zeitfenster, in dem wir die Themen angehen.</StepItem>
            </div>
          </div>
          <div className="block">
            <p className="sec">Media-Slots</p>
            <div style={{display:"flex",gap:16,alignItems:"flex-end"}}>
              <div style={{width:120}}><MediaSlot label="Portrait" ratio="1 / 1" rounded="circle" /></div>
              <div style={{width:160}}><MediaSlot label="Lifestyle" ratio="4 / 5" /></div>
              <div style={{width:220}}><MediaSlot label="Video" ratio="16 / 9" /></div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body></html>
