<!-- @dsCard group="Brand" viewport="700x210" subtitle="Warm, du-form, reassuring" name="Voice & tone" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{padding:22px 26px;display:flex;gap:22px}
  .col{flex:1 1 0}
  .h{font:600 11px var(--font-sans);letter-spacing:var(--ls-eyebrow);text-transform:uppercase;margin:0 0 10px}
  .line{font-size:13.5px;line-height:1.5;margin:0 0 7px;display:flex;gap:8px}
  .do .mark{color:var(--sage-600)}
  .dont .mark{color:var(--clay-700)}
  .dont span:last-child{color:var(--text-secondary)}
  .quote{font-family:var(--font-display);font-style:italic;font-size:16px;line-height:1.4;color:var(--ink-700)}
</style></head>
<body>
  <div class="wrap">
    <div class="col do">
      <p class="h" style="color:var(--sage-700)">So sprechen wir</p>
      <p class="line"><span class="mark">✓</span><span>Immer „du“ — nah & vertrauensvoll</span></p>
      <p class="line"><span class="mark">✓</span><span>Warm, ermutigend, ohne Druck</span></p>
      <p class="line"><span class="mark">✓</span><span>Klar & einfach, keine Fachbegriffe</span></p>
      <p class="quote" style="margin-top:14px">„Gib dir eine Chance.“</p>
    </div>
    <div class="col dont">
      <p class="h" style="color:var(--clay-700)">Das vermeiden wir</p>
      <p class="line"><span class="mark">✕</span><span>Klinisch-distanziertes „Sie“</span></p>
      <p class="line"><span class="mark">✕</span><span>Heilversprechen & Superlative</span></p>
      <p class="line"><span class="mark">✕</span><span>Angst- oder Druckrhetorik</span></p>
    </div>
  </div>
</body></html>
