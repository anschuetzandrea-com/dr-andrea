<!-- @dsCard group="Colors" viewport="700x180" subtitle="Primary — calm, growth, nature" name="Sage (primary)" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{display:flex;gap:12px;padding:20px}
  .sw{flex:1 1 0}
  .chip{height:90px;border-radius:var(--radius-md);border:1px solid var(--line)}
  .lab{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);line-height:1.4}
  .lab b{display:block;color:var(--text-primary);font-weight:500}
  .tag{position:absolute;margin:8px;font:500 11px var(--font-sans);color:#fff;background:rgba(0,0,0,.18);padding:2px 7px;border-radius:var(--radius-pill)}
</style></head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#4C5743"></div><div class="lab"><b>sage-700</b>#4C5743</div></div>
    <div class="sw"><div class="chip" style="background:#62704F;position:relative"><span class="tag">PRIMARY</span></div><div class="lab"><b>sage-600</b>#62704F</div></div>
    <div class="sw"><div class="chip" style="background:#7C8A66"></div><div class="lab"><b>sage-500</b>#7C8A66</div></div>
    <div class="sw"><div class="chip" style="background:#D6DCC6"></div><div class="lab"><b>sage-200</b>#D6DCC6</div></div>
    <div class="sw"><div class="chip" style="background:#E8EBDD"></div><div class="lab"><b>sage-100</b>#E8EBDD</div></div>
  </div>
</body></html>
