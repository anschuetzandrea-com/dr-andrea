<!-- @dsCard group="Brand" viewport="700x200" subtitle="Wordmark built from type — no icon needed" name="Wordmark" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary);display:flex;gap:0}
  .wrap{display:flex;width:100%}
  .cell{flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:24px;border-right:1px solid var(--line)}
  .cell:last-child{border:none}
  .mark{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:30px;letter-spacing:-0.01em}
  .sub{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
  .tag{font:600 10px var(--font-sans);letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--text-muted)}
</style></head>
<body>
  <div class="wrap">
    <div class="cell">
      <div class="mark" style="color:var(--ink-900)">Dr. Andrea</div>
      <div class="sub">Persönlichkeitsentwicklung</div>
      <div class="tag" style="margin-top:6px">Primär</div>
    </div>
    <div class="cell" style="background:var(--ink-900)">
      <div class="mark" style="color:var(--cream-50)">Dr. Andrea</div>
      <div class="sub" style="color:var(--clay-500)">Persönlichkeitsentwicklung</div>
      <div class="tag" style="margin-top:6px;color:var(--cream-200)">Invertiert</div>
    </div>
    <div class="cell" style="background:var(--sage-100)">
      <div class="mark" style="color:var(--sage-700)">A</div>
      <div class="sub">Monogramm</div>
      <div class="tag" style="margin-top:6px">Favicon / Avatar</div>
    </div>
  </div>
</body></html>
