<!-- @dsCard group="Type" viewport="700x180" subtitle="Eyebrow labels + meta in mono" name="Eyebrow & mono" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:18px}
  .eyebrow{font:600 13px var(--font-sans);letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--clay-600)}
  .mono{font-family:var(--font-mono);font-size:14px;color:var(--ink-700)}
  .muted{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
</style></head>
<body>
  <div class="wrap">
    <div class="eyebrow">Über 15 Jahre Erfahrung</div>
    <div class="mono">15&nbsp;min · kostenloses Erstgespräch</div>
    <div class="muted">Spline Sans Mono · für Labels, Captions, Zahlen & Meta-Angaben</div>
  </div>
</body></html>
