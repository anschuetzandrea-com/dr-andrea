<!-- @dsCard group="Colors" viewport="700x180" subtitle="Warm cream surfaces + charcoal ink" name="Neutrals" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{display:flex;flex-wrap:wrap;gap:0;padding:20px}
  .sw{flex:1 1 0;min-width:78px}
  .chip{height:84px;border-radius:var(--radius-md);border:1px solid var(--line)}
  .lab{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);line-height:1.4}
  .lab b{display:block;color:var(--text-primary);font-weight:500}
  .row{display:flex;gap:12px;padding:0 20px 20px}
</style></head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#FBF8F2"></div><div class="lab"><b>cream-50</b>#FBF8F2</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#F5F0E6"></div><div class="lab"><b>cream-100</b>#F5F0E6</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#ECE5D6"></div><div class="lab"><b>cream-200</b>#ECE5D6</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#DED3BE"></div><div class="lab"><b>sand-300</b>#DED3BE</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#79705F"></div><div class="lab"><b>ink-500</b>#79705F</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#4D463C"></div><div class="lab"><b>ink-700</b>#4D463C</div></div>
    <div class="sw" style="margin-left:12px"><div class="chip" style="background:#2A2620"></div><div class="lab"><b>ink-900</b>#2A2620</div></div>
  </div>
</body></html>
