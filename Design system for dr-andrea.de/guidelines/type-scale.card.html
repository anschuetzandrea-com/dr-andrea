<!-- @dsCard group="Type" viewport="700x300" subtitle="Roman serif headings + sans body" name="Scale" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--line);padding-bottom:13px}
  .row:last-child{border:none}
  .spec{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);white-space:nowrap;width:118px;flex:none}
  .serif{font-family:var(--font-display);color:var(--ink-700)}
  .sans{font-family:var(--font-sans);color:var(--ink-900)}
</style></head>
<body>
  <div class="wrap">
    <div class="row"><span class="spec">Display 46/Newsreader</span><span class="serif" style="font-size:40px;font-weight:500">Kann ich dir helfen?</span></div>
    <div class="row"><span class="spec">H2 34/Newsreader</span><span class="serif" style="font-size:30px;font-weight:500">Jetzt dein Leben verändern</span></div>
    <div class="row"><span class="spec">H3 25/Newsreader</span><span class="serif" style="font-size:23px;font-weight:600">Boris Bezend</span></div>
    <div class="row"><span class="spec">Body 17/Hanken</span><span class="sans" style="font-size:17px">Unterstützung in herausfordernden Lebensphasen.</span></div>
    <div class="row"><span class="spec">Small 15/Hanken</span><span class="sans" style="font-size:15px;color:var(--ink-500)">Du kannst mir auch gerne per Mail schreiben.</span></div>
  </div>
</body></html>
