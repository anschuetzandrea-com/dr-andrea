<!-- @dsCard group="Spacing" viewport="700x180" subtitle="4px base grid" name="Spacing scale" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--surface-card);color:var(--text-primary)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:11px}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:16px;background:var(--sage-500);border-radius:3px}
  .lab{font-size:11px;color:var(--text-secondary);width:120px;flex:none}
</style></head>
<body>
  <div class="wrap">
    <div class="row"><span class="lab">space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
    <div class="row"><span class="lab">space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
    <div class="row"><span class="lab">space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
    <div class="row"><span class="lab">space-5 · 24px</span><div class="bar" style="width:24px"></div></div>
    <div class="row"><span class="lab">space-6 · 32px</span><div class="bar" style="width:32px"></div></div>
    <div class="row"><span class="lab">space-7 · 48px</span><div class="bar" style="width:48px"></div></div>
    <div class="row"><span class="lab">space-8 · 64px</span><div class="bar" style="width:64px"></div></div>
  </div>
</body></html>
