<!-- @dsCard group="Colors" viewport="700x180" subtitle="Accent — warmth, the personal touch" name="Clay (accent)" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{display:flex;gap:12px;padding:20px}
  .sw{flex:1 1 0}
  .chip{height:90px;border-radius:var(--radius-md);border:1px solid var(--line)}
  .lab{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);line-height:1.4}
  .lab b{display:block;color:var(--text-primary);font-weight:500}
  .tag{position:absolute;margin:8px;font:500 11px var(--font-sans);color:#fff;background:rgba(0,0,0,.18);padding:2px 7px;border-radius:var(--radius-pill)}
</style></head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#97603C"></div><div class="lab"><b>clay-700</b>#97603C</div></div>
    <div class="sw"><div class="chip" style="background:#B0744C;position:relative"><span class="tag">ACCENT</span></div><div class="lab"><b>clay-600</b>#B0744C</div></div>
    <div class="sw"><div class="chip" style="background:#C28C66"></div><div class="lab"><b>clay-500</b>#C28C66</div></div>
    <div class="sw"><div class="chip" style="background:#EAD6C4"></div><div class="lab"><b>clay-200</b>#EAD6C4</div></div>
    <div class="sw"><div class="chip" style="background:#F4E8DC"></div><div class="lab"><b>clay-100</b>#F4E8DC</div></div>
  </div>
</body></html>
