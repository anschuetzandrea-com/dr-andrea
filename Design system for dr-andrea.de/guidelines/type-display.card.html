<!-- @dsCard group="Type" viewport="700x230" subtitle="Newsreader italic — the brand's headline voice" name="Display serif" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);color:var(--text-primary)}
  .wrap{padding:26px 28px}
  .eyebrow{font:600 12px var(--font-sans);letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--clay-600);margin-bottom:14px}
  .display{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:58px;line-height:1.04;letter-spacing:-0.02em;color:var(--ink-900);margin:0}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:16px}
</style></head>
<body>
  <div class="wrap">
    <div class="eyebrow">Finde dich selbst</div>
    <p class="display">Gib dir<br>eine Chance.</p>
    <div class="meta">Newsreader · italic · 500 · 58px / 1.04 · -0.02em</div>
  </div>
</body></html>
